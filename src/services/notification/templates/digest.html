<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Intelligence Digest</title>
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f8fafc;
      color: #1e293b;
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
    }
    .wrapper {
      width: 100%;
      background-color: #f8fafc;
      padding: 40px 0;
    }
    .container {
      max-width: 650px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      border: 1px solid #e2e8f0;
    }
    .header {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
      padding: 40px 30px;
      text-align: center;
      color: #ffffff;
    }
    .header h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.025em;
    }
    .header p {
      margin: 8px 0 0 0;
      font-size: 15px;
      color: #c7d2fe;
      font-weight: 500;
    }
    .content {
      padding: 30px;
    }
    .date-badge {
      display: inline-block;
      background-color: #e0e7ff;
      color: #4338ca;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 12px;
      border-radius: 9999px;
      text-transform: uppercase;
      margin-bottom: 25px;
      letter-spacing: 0.05em;
    }
    .article-card {
      background-color: #ffffff;
      border: 1px solid #f1f5f9;
      border-left: 4px solid #4f46e5;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.01), 0 1px 2px -1px rgb(0 0 0 / 0.01);
    }
    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .source-tag {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      background-color: #f1f5f9;
      padding: 4px 8px;
      border-radius: 6px;
    }
    .badge-row {
      margin-top: -4px;
    }
    .score-badge {
      font-size: 12px;
      font-weight: 700;
      padding: 4px 8px;
      border-radius: 6px;
      color: #ffffff;
    }
    .score-high {
      background-color: #10b981;
    }
    .score-mid {
      background-color: #3b82f6;
    }
    .score-low {
      background-color: #64748b;
    }
    .article-title {
      font-size: 19px;
      font-weight: 700;
      margin: 8px 0 12px 0;
      line-height: 1.4;
    }
    .article-title a {
      color: #0f172a;
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .article-title a:hover {
      color: #4f46e5;
    }
    .summary-text {
      font-size: 14px;
      line-height: 1.6;
      color: #475569;
      margin-bottom: 16px;
    }
    .takeaways-title {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #4f46e5;
      margin: 16px 0 8px 0;
    }
    .takeaways-list {
      margin: 0;
      padding-left: 20px;
    }
    .takeaways-list li {
      font-size: 13px;
      line-height: 1.6;
      color: #334155;
      margin-bottom: 6px;
    }
    .footer {
      background-color: #f1f5f9;
      padding: 25px 30px;
      text-align: center;
      font-size: 12px;
      color: #64748b;
      border-top: 1px solid #e2e8f0;
    }
    .footer p {
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <div class="header">
        <h1>AI Intelligence Digest</h1>
        <p>Curated & LLM-Validated Industry Updates</p>
      </div>
      <div class="content">
        <div class="date-badge">{{DATE}}</div>
        
        {{ARTICLES}}
        
      </div>
      <div class="footer">
        <p>This report was automatically aggregated, curated by LLM auditing, and compiled.</p>
        <p>Configure schedules or feeds directly inside your personal server settings.</p>
      </div>
    </div>
  </div>
</body>
</html>
